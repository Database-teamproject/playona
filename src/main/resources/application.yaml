spring:
  application:
    name: playona

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/playona}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always          # PostgreSQL(비임베디드 DB)에서도 data.sql 실행
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true   # JPA 테이블 생성 후 data.sql 실행 보장

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:test-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:test-google-client-secret}
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID:test-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:test-kakao-client-secret}
            redirect-uri: "${KAKAO_REDIRECT_URI:{baseUrl}/login/oauth2/code/kakao}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    url: /openapi.yaml
    path: /swagger-ui/index.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

jwt:
  # ⚠️ 프로덕션 배포 시 JWT_SECRET 환경변수 필수 (32자 이상 랜덤 문자열)
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-chars}
  access-expiration: 3600000      # 1시간 (ms)
  refresh-expiration: 1209600000  # 14일 (ms)

youtube:
  api-key: ${YOUTUBE_API_KEY}

spotify:
  client-id: ${SPOTIFY_CLIENT_ID}
  client-secret: ${SPOTIFY_CLIENT_SECRET}

# ── EC2 프로덕션 배포 시 반드시 설정해야 할 환경변수 ──────────────────────────
# APP_BASE_URL          : 공유 링크 도메인 (프론트 URL) ex) https://playona-five.vercel.app
# OAUTH2_REDIRECT_URL   : OAuth 로그인 성공 후 이동할 프론트 콜백 페이지
#                         ex) https://playona-five.vercel.app/auth/callback
# ────────────────────────────────────────────────────────────────────────────────
oauth2:
  redirect-url: ${OAUTH2_REDIRECT_URL:http://localhost:3000/auth/callback}

app:
  base-url: ${APP_BASE_URL:http://localhost:3000}
