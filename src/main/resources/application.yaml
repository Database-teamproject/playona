spring:
  application:
    name: playona

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbec:postgresql://localhost:5432/playona}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-chars}
  access-expiration: 3600000
  refresh-expiration: 1209600000

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    url: /openapi.yaml
  api-docs:
    path: /v3/api-docs